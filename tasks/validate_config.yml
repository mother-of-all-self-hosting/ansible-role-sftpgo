---
- name: (Deprecation) Catch and report renamed settings
  ansible.builtin.fail:
    msg: >-
      Your configuration contains a variable, which now has a different name.
      Please change your configuration to rename the variable (`{{ item.old }}` -> `{{ item.new }}`).
  when: "lookup('ansible.builtin.varnames', ('^' + item.old + '$'), wantlist=True) | length > 0"
  with_items:
    - { "old": "sftpgo_http_header_content_permission_policy", "new": "sftpgo_http_header_permissions_policy" }
    - { "old": "sftpgo_database_mysql_name", "new": "sftpgo_database_name" }
    - { "old": "sftpgo_database_postgresql_name", "new": "sftpgo_database_name" }
    - { "old": "sftpgo_database_postgresql_hostname", "new": "sftpgo_database_postgres_hostname" }
    - { "old": "sftpgo_database_postgresql_port", "new": "sftpgo_database_postgres_port" }
    - { "old": "sftpgo_database_postgresql_username", "new": "sftpgo_database_postgres_username" }
    - { "old": "sftpgo_database_postgresql_password", "new": "sftpgo_database_postgres_password" }
    - { "old": "sftpgo_environment_variables_smtp_enabled", "new": "sftpgo_mailer_smtp_enabled" }
    - { "old": "sftpgo_environment_variables_webdav_enabled", "new": "sftpgo_environment_variables_webdavd_enabled" }
    - { "old": "sftpgo_environment_variables_enable_https", "new": "sftpgo_environment_variables_webdavd_enable_https" }
    - { "old": "sftpgo_environment_variables_certificate_file", "new": "sftpgo_environment_variables_webdavd_certificate_file" }
    - { "old": "sftpgo_environment_variables_certificate_key_file", "new": "sftpgo_environment_variables_webdavd_certificate_key_file" }
    - { "old": "sftpgo_environment_variables_http_bindings_enable_web_admin:", "new": "sftpgo_environment_variables_httpd_bindings_0_enable_web_admin" }
    - { "old": "sftpgo_environment_variables_http_bindings_enable_web_client:", "new": "sftpgo_environment_variables_httpd_bindings_0_enable_web_client" }

- name: Fail if required SFTPGo settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`).
  when: "lookup('vars', item, default='') | string | length == 0"
  with_items:
    - sftpgo_uid
    - sftpgo_gid
    - sftpgo_hostname
    - sftpgo_path_prefix
    - sftpgo_container_network
    - sftpgo_environment_variables_data_provider_driver

- name: Fail if SFTPGo data provider invalid
  ansible.builtin.fail:
    msg: >-
      sftpgo_environment_variables_data_provider_driver must be 'sqlite', 'mysql', 'postgres', 'cockroachdb', 'bolt', or 'memory'
  when: "sftpgo_environment_variables_data_provider_driver not in ['sqlite', 'mysql', 'postgres', 'cockroachdb', 'bolt', 'memory']"

- name: Fail if required SFTPGo + MySQL integration settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`) when `sftpgo_environment_variables_data_provider_driver` is `mysql`
  when: "sftpgo_environment_variables_data_provider_driver == 'mysql' and lookup('vars', item, default='') | string | length == 0"
  with_items:
    - sftpgo_database_mysql_hostname
    - sftpgo_database_mysql_password

- name: Run if SFTPGo + Postgres integration is enabled
  when: sftpgo_environment_variables_data_provider_driver == 'postgres'
  block:
    - name: Fail if required SFTPGo + Postgres integration settings not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`) when `sftpgo_environment_variables_data_provider_driver` is `postgres`
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - sftpgo_database_postgres_password

    - name: Fail if Postgres socket host path for SFTPGo is missing when Unix socket is enabled
      ansible.builtin.fail:
        msg: >-
          You need to define `sftpgo_database_postgres_socket_path_host` when `sftpgo_environment_variables_data_provider_driver` is `postgres`
          and `sftpgo_database_postgres_socket_enabled` is `true`.
      when: >-
        sftpgo_database_postgres_socket_enabled and
        sftpgo_database_postgres_socket_path_host | string | length == 0

    - name: Fail if Postgres hostname for SFTPGo is missing when Unix socket is disabled
      ansible.builtin.fail:
        msg: >-
          You need to define `sftpgo_database_postgres_hostname` when `sftpgo_environment_variables_data_provider_driver` is `postgres`
          and `sftpgo_database_postgres_socket_enabled` is `false`.
      when: >-
        not sftpgo_database_postgres_socket_enabled and
        sftpgo_database_postgres_hostname | string | length == 0

- name: Fail if SMTP settings are missing (and SMTP is enabled by setting host)
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`) to correctly set up email via SMTP.
  when: "sftpgo_mailer_smtp_enabled | bool and lookup('vars', item, default='') | string | length == 0"
  with_items:
    - sftpgo_environment_variables_smtp_host
    - sftpgo_environment_variables_smtp_port
    - sftpgo_environment_variables_smtp_from

- name: Run if Traefik is enabled
  when: sftpgo_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for SFTPGo are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - sftpgo_container_labels_traefik_hostname
        - sftpgo_container_labels_traefik_path_prefix

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `sftpgo_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if sftpgo_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          sftpgo_container_labels_traefik_path_prefix (`{{ sftpgo_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/sftpgo`).
      when: "sftpgo_container_labels_traefik_path_prefix != '/' and sftpgo_container_labels_traefik_path_prefix[-1] == '/'"

- name: Run if Traefik is enabled for Prometheus endpoint
  when: sftpgo_metrics_enabled | bool
  block:
    - name: Fail if Traefik settings required for SFTPGo metrics endpoint are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item.name }}`) for using this role.
      when: "item.when | bool and lookup('vars', item.name, default='') | string | length == 0"
      with_items:
        - { "name": "sftpgo_container_labels_traefik_metrics_hostname", when: true }
        - { "name": "sftpgo_container_labels_traefik_metrics_path_prefix", when: true }
        - { "name": "sftpgo_container_labels_traefik_metrics_middleware_basic_auth_users", when: "{{ sftpgo_container_labels_traefik_metrics_middleware_basic_auth_enabled }}" }

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `sftpgo_container_labels_traefik_metrics_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if sftpgo_container_labels_traefik_metrics_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          sftpgo_container_labels_traefik_metrics_path_prefix (`{{ sftpgo_container_labels_traefik_metrics_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/metrics`).
      when: "sftpgo_container_labels_traefik_metrics_path_prefix != '/' and sftpgo_container_labels_traefik_metrics_path_prefix[-1] == '/'"
